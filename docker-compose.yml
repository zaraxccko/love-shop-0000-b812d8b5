# ============================================================
# Production stack для prxvt.ink
#   docker compose up --build -d
# ============================================================
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-shopdb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser} -d ${POSTGRES_DB:-shopdb}"]
      interval: 5s
      retries: 10

  api:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./.env
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/data/uploads
    expose:
      - "3000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_ADMIN_IDS: ${VITE_ADMIN_IDS:-}
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - api

  proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      APP_DOMAINS: ${APP_DOMAINS:-}
      VITE_API_URL: ${VITE_API_URL:-}
      WEBAPP_URL: ${WEBAPP_URL:-}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    entrypoint:
      - /bin/sh
      - -c
      - |
        DOMAINS="${APP_DOMAINS:-}"
        if [ -z "$$DOMAINS" ]; then
          SRC="$${WEBAPP_URL:-$${VITE_API_URL:-}}"
          if [ -n "$$SRC" ]; then
            HOST=$$(printf '%s' "$$SRC" | sed -E 's#^[A-Za-z]+://##; s#/.*$$##; s#:.*$$##')
            case "$$HOST" in
              www.*) DOMAINS="$$HOST, $${HOST#www.}" ;;
              "")    : ;;
              *)     DOMAINS="$$HOST, www.$$HOST" ;;
            esac
          fi
        fi
        if [ -z "$$DOMAINS" ]; then
          echo "[proxy] APP_DOMAINS empty and cannot derive from WEBAPP_URL/VITE_API_URL" >&2
          exit 1
        fi
        export APP_DOMAINS="$$DOMAINS"
        echo "[proxy] starting Caddy for: $$APP_DOMAINS"
        exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    depends_on:
      - frontend
      - api

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
